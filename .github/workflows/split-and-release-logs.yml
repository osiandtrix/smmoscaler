name: Split Logs & Create Release

on:
  push:
    paths:
      - 'smmoscaler-logs.json'
      - '.github/workflows/split-and-release-logs.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  split-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run split_logs.py
        run: python scripts/split_logs.py

      - name: Get the latest log file size
        id: logsize
        run: |
          SIZE=$(stat -f%z smmoscaler-logs.json 2>/dev/null || stat -c%s smmoscaler-logs.json 2>/dev/null)
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          echo "Log file size: ${SIZE_MB}MB"

      - name: Prepare release files
        id: prepare
        run: |
          # Get list of all log files for the release
          LOG_FILES=$(ls smmoscaler-logs*.json 2>/dev/null | tr '\n' ' ')
          echo "log_files=$LOG_FILES" >> $GITHUB_OUTPUT
          
          # Read the index to get version info
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Create Release with Log Files
        uses: softprops/action-gh-release@v1
        with:
          tag_name: logs-${{ github.run_number }}
          name: "Log Release #${{ github.run_number }}"
          body: |
            Automatically generated log release
            
            **Size:** ${{ steps.logsize.outputs.size_mb }}MB
            **Updated:** ${{ steps.prepare.outputs.timestamp }}
            
            Includes split log files and index for cross-origin access via GitHub releases.
          files: |
            smmoscaler-logs*.json
            smmoscaler-logs.index.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update index to use release URLs
        run: |
          python3 << 'EOF'
          import json
          import re
          from pathlib import Path
          
          # Read current index
          index_path = Path("smmoscaler-logs.index.json")
          with open(index_path, 'r', encoding='utf-8') as f:
            index = json.load(f)
          
          # Get list of local log files
          local_files = list(Path('.').glob('smmoscaler-logs*.json'))
          local_names = [f.name for f in local_files if f.name != 'smmoscaler-logs.json']
          local_names.insert(0, 'smmoscaler-logs.json')  # Base file first
          
          # Update index to use release CDN URLs
          # Format: https://github.com/{owner}/{repo}/releases/download/{tag}/{filename}
          repo = "${{ github.repository }}"
          tag = "logs-${{ github.run_number }}"
          
          release_files = [
            f"https://github.com/{repo}/releases/download/{tag}/{filename}"
            for filename in local_names
          ]
          
          index['files'] = release_files
          index['updated'] = "${{ steps.prepare.outputs.timestamp }}"
          index['source'] = 'github-releases'
          
          with open(index_path, 'w', encoding='utf-8') as f:
            json.dump(index, f, indent=2, ensure_ascii=False)
            f.write('\n')
          
          print(f"Updated index with {len(release_files)} files from release")
          print(json.dumps(index, indent=2))
          EOF

      - name: Commit updated index
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add smmoscaler-logs.index.json
          git commit -m "ci: update log index with release URLs (run ${{ github.run_number }})" || echo "No changes to commit"
          git push

      - name: Post release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Release:** logs-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${{ steps.logsize.outputs.size_mb }}MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Files:** $(echo '${{ steps.prepare.outputs.log_files }}' | wc -w)" >> $GITHUB_STEP_SUMMARY
          echo "- **Download:** https://github.com/${{ github.repository }}/releases/tag/logs-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
